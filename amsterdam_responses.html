<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amsterdam 30 km/h – Antwoorden</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    background: #f5f5f5;
    color: #111;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0e0e0;
    padding: 1.5rem;
  }
  h1 {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 1rem;
    color: #111;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid #e8e8e8;
    margin-bottom: 0.75rem;
  }
  .toolbar label {
    font-size: 13px;
    color: #666;
    margin-right: 2px;
  }
  .sep { width: 1px; height: 20px; background: #ddd; margin: 0 4px; }
  .pill {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid #ddd;
    background: #fff;
    color: #555;
    transition: background 0.1s, color 0.1s;
    user-select: none;
  }
  .pill:hover { background: #f0f0f0; }
  .pill.active { background: #111; color: #fff; border-color: #111; }
  .count {
    font-size: 13px;
    color: #888;
    margin-bottom: 0.5rem;
  }
  .list {
    display: flex;
    flex-direction: column;
    max-height: 480px;
    overflow-y: auto;
    border: 1px solid #e8e8e8;
    border-radius: 10px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 13px 16px;
    border-bottom: 1px solid #f0f0f0;
    background: #fff;
  }
  .row:last-child { border-bottom: none; }
  .text { font-size: 14px; color: #111; flex: 1; line-height: 1.5; }
  .badges { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .lang {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid #ddd;
    color: #666;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .sentiment {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 600;
  }
  .s-Positief { background: #e6f4d7; color: #2d6a0a; }
  .s-Negatief { background: #fde8e8; color: #a32d2d; }
  .s-Kritisch { background: #fef3cd; color: #7a4e0d; }
  .empty {
    padding: 2rem;
    text-align: center;
    font-size: 14px;
    color: #888;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #eee; }
    .container { background: #242424; border-color: #333; }
    h1 { color: #eee; }
    .pill { background: #2e2e2e; border-color: #444; color: #bbb; }
    .pill:hover { background: #3a3a3a; }
    .pill.active { background: #eee; color: #111; border-color: #eee; }
    .list { border-color: #333; }
    .row { background: #242424; border-color: #2e2e2e; }
    .text { color: #ddd; }
    .lang { border-color: #444; color: #aaa; }
    .sep { background: #444; }
    .s-Positief { background: #1a3a0a; color: #a0d070; }
    .s-Negatief { background: #3a1010; color: #f09090; }
    .s-Kritisch { background: #3a2a00; color: #f0c060; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Amsterdam 30 km/h – Antwoorden</h1>
  <div class="toolbar">
    <label>Taal:</label>
    <span class="pill active" data-filter="lang" data-val="all">Alle</span>
    <span class="pill" data-filter="lang" data-val="NL">NL</span>
    <span class="pill" data-filter="lang" data-val="EN">EN</span>
    <div class="sep"></div>
    <label>Sentiment:</label>
    <span class="pill active" data-filter="sentiment" data-val="all">Alle</span>
    <span class="pill" data-filter="sentiment" data-val="Positief">Positief</span>
    <span class="pill" data-filter="sentiment" data-val="Negatief">Negatief</span>
    <span class="pill" data-filter="sentiment" data-val="Kritisch">Kritisch</span>
  </div>
  <div class="count" id="count">37 antwoorden</div>
  <div class="list" id="list"></div>
</div>

<script>
const raw = [
  {t:"Files.",lang:"nl",s:"Negatief"},
  {t:"Prettiger fietsen en oversteken te voet.",lang:"nl",s:"Positief"},
  {t:"Traffic jamming and fuel consumption",lang:"en",s:"Negatief"},
  {t:"Ik ervaar hinder",lang:"nl",s:"Negatief"},
  {t:"Meer bijna ongelukken en frustratie onder automobilisten, scooters en fietsers",lang:"nl",s:"Negatief"},
  {t:"Yes, traffic jams and the fact that i cant get anywhere in this city. RAISE IT!!!",lang:"en",s:"Negatief"},
  {t:"Voor wegbestuurders gevaar ivm vaker voorkomen bumperkleven",lang:"nl",s:"Negatief"},
  {t:"More stop and go, more traffic jams,",lang:"en",s:"Negatief"},
  {t:"Worden ze ongeduldig",lang:"nl",s:"Negatief"},
  {t:"Rijden minder hard op plekken waar het is ingevoerd. Maar sommigen rijden juist nog steeds dezelfde snelheid als voorheen",lang:"nl",s:"Negatief"},
  {t:"Langzamer autoverkeer, makkelijker oversteken",lang:"nl",s:"Negatief"},
  {t:"Frustratie onder veel weggebruikers, automobilisten die 20km p.u. gaan rijden, sneller onterecht voorrang willen pakken (vooral fietsers en scooters)",lang:"nl",s:"Negatief"},
  {t:"More people over the speed limit at all times whenever they can",lang:"en",s:"Negatief"},
  {t:"Taxi and Uber drivers are always speeding as usual, I see people trying to respect the speed limit once there are physical barriers like bumpers though",lang:"en",s:"Negatief"},
  {t:"Meestal veiliger, maar soms ook ongeduldig en aan het bumperkleven wat voor de voorste auto gevaarlijk kan zijn",lang:"nl",s:"Positief"},
  {t:"Niet meer planken want sommigen houden zich wel aan de 30km",lang:"nl",s:"Positief"},
  {t:"Kalmer optrekken",lang:"nl",s:"Positief"},
  {t:"Rijden rustiger",lang:"nl",s:"Positief"},
  {t:"Zorgen voor lange files",lang:"nl",s:"Negatief"},
  {t:"Ik heb het idee dat het wel ongeveer goed geregeld is. Soms vraag ik me af om het ene stuk wel en het andere stuk niet. Maar dat is wel duidelijk te zien aan de markering op het wegdek.",lang:"nl",s:"Kritisch"},
  {t:"The slow reduction is impacting quick movement of cars and bicycle secondly there is no synchronisation with the traffic light. It affects fuel consumption.",lang:"en",s:"Negatief"},
  {t:"T is tergend langzaam",lang:"nl",s:"Negatief"},
  {t:"Onzin",lang:"nl",s:"Negatief"},
  {t:"Er moeten meer wegen, zeker waar er een gescheiden fietspad is weer 50 km p.u. worden, beter voor de doorstroom en zorgt voor minder frustratie en gekke inhaalmomenten of dat er ineens fietsers of scooters onterecht voorrang pakken en daarmee veiliger.",lang:"nl",s:"Negatief"},
  {t:"Because it is ridicoulus and statisticly unviable. Pollution of cars is statistically about 95% at a speed of 30 than 50. You have to drive 30 for longer and build more jams witch effectively results in higher pollution. Germany proves year by year that a higher speed limit is definitely accelerating traffic and minimizing pollution.",lang:"en",s:"Negatief"},
  {t:"I think pedestarian & bike only zones should be the next step, especially around the canals",lang:"en",s:"Positief"},
  {t:"Goed om in te voeren. Zorgt voor meer veiligheid",lang:"nl",s:"Positief"},
  {t:"Ik ben er tevreden over. Ik rijd zelf auto, in de stad fiets ik vooral.",lang:"nl",s:"Positief"},
  {t:"We risk slowing traffic movement thus impacting the mood of drivers.",lang:"en",s:"Negatief"},
  {t:"STOP HIERMEE, gewoon weer 50:80",lang:"nl",s:"Negatief"},
  {t:"Bullshit",lang:"en",s:"Negatief"},
  {t:"Voor het invoeren was het hoofdzakelijk terecht 50km p.u., maar idd sommige drukke voetganger gebieden zoals zoals de 9-straatjes is terecht 30km p.u.",lang:"nl",s:"Positief"},
  {t:"It is one if not of the most stupid decisions this city council has taken since i moved here 8 years ago.",lang:"en",s:"Negatief"},
  {t:"I think stricter enforcement and/or physical barriers are needed, given the amount of violations I still observe, especially during night time",lang:"en",s:"Kritisch"},
  {t:"Veelal veiliger, maar niet te handhaven (wegdek niet in overeenkomstig met een 30 km weg), soms gevaarlijke situaties met ongeduldige bestuurders. Soms is het ook onnodig dat een weg 30 km is (vrijwel geen oversteekplaatsen en bebouwing)",lang:"nl",s:"Kritisch"},
  {t:"Het is veiliger geworden. Nu de straat aanpassen de komende decennia.",lang:"nl",s:"Positief"},
  {t:"I don't think the goal to reduce CO2 was reached, although I feel safer as a pedestrian walking through the center of Amsterdam.",lang:"en",s:"Kritisch"},
];

function detectLang(t) {
  const nlWords = /\b(de|het|een|en|van|in|op|dat|is|zijn|niet|met|voor|aan|te|er|maar|om|zo|ook|dit|als|bij|door|wordt|werd|al|nog|meer|wel|dan|over|naar|heeft|hebben|was|die|wat|zij|we|ze|ik|je|ze|kan|moet|goed|veel|weg|rijden|auto|fiets|snelheid|stad|straat)\b/i;
  const enWords = /\b(the|and|is|are|in|of|to|a|that|it|for|on|with|this|at|by|from|or|but|be|have|as|not|they|we|you|i|can|do|think|people|speed|traffic|city|car|feel|still)\b/i;
  const nlScore = (t.match(nlWords) || []).length;
  const enScore = (t.match(enWords) || []).length;
  return enScore > nlScore ? "en" : "nl";
}

const data = raw.map(r => ({...r, detectedLang: detectLang(r.t)}));

let langFilter = "all", sentFilter = "all";

function render() {
  const list = document.getElementById("list");
  const count = document.getElementById("count");
  const filtered = data.filter(r => {
    const langOk = langFilter === "all" || r.detectedLang === langFilter.toLowerCase();
    const sentOk = sentFilter === "all" || r.s === sentFilter;
    return langOk && sentOk;
  });
  count.textContent = filtered.length + " antwoorden";
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Geen antwoorden gevonden</div>';
    return;
  }
  list.innerHTML = filtered.map(r =>
    `<div class="row">
      <span class="text">${r.t.replace(/</g,"&lt;")}</span>
      <div class="badges">
        <span class="lang">${r.detectedLang.toUpperCase()}</span>
        <span class="sentiment s-${r.s}">${r.s}</span>
      </div>
    </div>`
  ).join("");
}

document.querySelectorAll(".pill").forEach(p => {
  p.addEventListener("click", () => {
    const f = p.dataset.filter;
    const v = p.dataset.val;
    if (f === "lang") {
      langFilter = v;
      document.querySelectorAll("[data-filter='lang']").forEach(x => x.classList.remove("active"));
    } else {
      sentFilter = v;
      document.querySelectorAll("[data-filter='sentiment']").forEach(x => x.classList.remove("active"));
    }
    p.classList.add("active");
    render();
  });
});

render();
</script>
</body>
</html>
